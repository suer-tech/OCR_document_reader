profile_id: court_decision_ru

applicable_sources:
  - crm
  - email
  - portal
  - external
  - other

document_type: court_decision

models:
  ocr:
    provider: openrouter
    model: openai/gpt-oss-120b
  llm_extraction:
    provider: yandex_studio
    model: gpt://b1gf6vai2af80k10pig0/deepseek-v4-flash/latest
    fallback_models:
      - openai/gpt-oss-120b
      - x-ai/grok-4.1-fast
    temperature: 0.0
    timeout_seconds: 180.0

thresholds:
  technical_quality_min: 0.6
  semantic_confidence_min: 0.7
  overall_quality_min_auto_accept: 0.75
  warnings_require_review: false

fields:
  debtor_full_name:
    required: true
    label_ru: "ФИО должника"
    description_ru: "Полное ФИО должника в формате 'Фамилия Имя Отчество'. Ищите рядом с 'должник', 'заявитель'"
    extraction_method: "llm"
    prompt_instruction: |
      МЕТОДОЛОГИЯ АНАЛИЗА (SGR / Step-by-Step Reasoning):
      Сначала выполни пошаговые рассуждения в поле "reasoning" строго следуя шагам:
      1. Найди в тексте ФИО должника (рядом со словами 'должник', 'заявитель' или 'в отношении').
      2. Найди все упоминания должника по тексту.
      3. Сравни варианты, если есть OCR-опечатки (например, "Иванову" vs "Иванов"), выбери наиболее корректный вариант.
      4. Переведи выбранное ФИО в ИМЕНИТЕЛЬНЫЙ падеж (Кто? Что?), в формате "Фамилия Имя Отчество".
      
      В поле "value" запиши итоговое ФИО.

  debtor_inn:
    required: true
    label_ru: "ИНН"
    description_ru: "ИНН должника - 12-значный номер рядом с ФИО должника. Ищите после 'ИНН'"
    extraction_method: "llm"
    prompt_instruction: "Извлеки ИНН должника - это 12-значный (для ИП/физлиц) или 10-значный номер (для юрлиц). Ищи после 'ИНН' или рядом с ФИО/наименованием."

  case_number:
    required: true
    label_ru: "Номер дела"
    description_ru: "Номер судебного дела в формате 'А05-6/2025' или 'Дело № А05-6/2025'."
    extraction_method: "regex_legacy"
    regex_pattern: "Дело\\s*(?:[№N]|ЛЪ|Л[ЬЫЪъ])?\\s*([АA]\\d{1,3}-\\d+/\\d{2,4})"

  judge_full_name:
    required: true
    label_ru: "ФИО судьи"
    description_ru: "'Судья', в самом конце документа. ФИО судьи в формате 'Фамилия И.О.'. Присвойте фамилие именительный падеж."
    extraction_method: "llm"
    prompt_instruction: |
      МЕТОДОЛОГИЯ АНАЛИЗА (SGR / Step-by-Step Reasoning):
      Сначала выполни пошаговые рассуждения в поле "reasoning" строго следуя шагам:
      1. Найди ФИО судьи в тексте (обычно в самом конце документа после слова 'Судья' или в шапке).
      2. Найди все упоминания фамилии судьи. Если есть опечатки OCR (например, "Буры" вместо "Буров", или "Александров" вместо "Александровна"), сравни значения фамилии судьи во всем документе.
      3. Переведи фамилию в ИМЕНИТЕЛЬНЫЙ падеж.
      4. Сформируй итоговое ФИО в формате 'Фамилия И.О.' (если имя и отчество указаны инициалами) или 'Фамилия Имя Отчество'.
      
      В поле "value" запиши итоговое ФИО судьи.

  court_name:
    required: true
    label_ru: "Название суда"
    description_ru: "Полное название суда в шапке документа. Ищите в самом верху документа большими буквами."
    extraction_method: "llm"
    prompt_instruction: "Извлеки полное название арбитражного суда. Обычно оно находится в самом верху шапки документа."

  decision_date:
    required: true
    label_ru: "Дата решения"
    description_ru: "Дата принятия решения в формате ДД.ММ.ГГГГ. Ищите после 'РЕШЕНИЕ', 'ДЕЛО' или 'Решение изготовлено'."
    extraction_method: "regex_legacy"
    prompt_instruction: "Извлеки дату принятия решения судом в формате ДД.ММ.ГГГГ. Часто встречается в шапке рядом с номером дела."

  procedure_type:
    required: false
    label_ru: "Тип процедуры"
    description_ru: "Процедура банкротства: 'реализация имущества', 'реструктуризация долгов'. Ищите в резолютивной части или обосновании."
    extraction_method: "llm"
    prompt_instruction: "Определи тип вводимой процедуры банкротства (например, 'реализация имущества граждан', 'реструктуризация долгов'). Ищи в резолютивной части (после слова РЕШИЛ/ОПРЕДЕЛИЛ)."

  procedure_end_date:
    required: false
    label_ru: "Дата окончания процедуры"
    description_ru: "Срок процедуры банкротства. Ищите фразу 'на срок * месяцев' или точную дату окончания рядом с введением процедуры"
    extraction_method: "regex_legacy"
    prompt_instruction: "Определи дату окончания процедуры (в формате ДД.ММ.ГГГГ). Иногда указан срок (например 'на 6 месяцев'), в этом случае прибавь этот срок к дате решения. Ищи в резолютивной части."

  procedure_end_date_is_calculated:
    required: false
    label_ru: "Является ли дата окончания вычисленной"
    description_ru: "True, если дата окончания вычислена по сроку в месяцах, False, если точная дата была явно указана в решении."
    extraction_method: "regex_legacy"
    prompt_instruction: "Верни 'True' если дата окончания процедуры была вычислена (на основе указанного срока в месяцах), или 'False' если дата была указана явно."

  early_report_deadline:
    required: false
    label_ru: "Заблаговременное предоставление отчета ФУ"
    description_ru: "Дата, к которой финансовый управляющий обязан представить отчёт/документы суду. Ищите в резолютивной части после 'РЕШИЛ'. Формат ДД.ММ.ГГГГ."
    extraction_method: "regex_legacy"
    prompt_instruction: "Найди дату заблаговременного представления отчета финансовым управляющим к судебному заседанию."

  motivating_part:
    required: false
    label_ru: "Мотивирующая часть"
    description_ru: "Мотивирующая часть судебного решения (текст между словами 'УСТАНОВИЛ' и 'РЕШИЛ')."
    extraction_method: "llm"
    prompt_instruction: "Извлеки мотивировочную часть (текст между 'УСТАНОВИЛ:' и 'РЕШИЛ:')."

  resolutive_part:
    required: false
    label_ru: "Резолютивная часть"
    description_ru: "Резолютивная часть судебного решения (текст после слова 'РЕШИЛ' и до фразы 'Электронная подпись действительна')."
    extraction_method: "llm"
    prompt_instruction: "Извлеки резолютивную часть (все выводы суда после 'РЕШИЛ:' или 'ОПРЕДЕЛИЛ:') и до фразы 'Электронная подпись действительна' или до конца текста."

pipeline:
  - name: store_original
    type: storage
  - name: detect_document_type
    type: classifier
  - name: extract_entities
    type: extraction
  - name: validate_entities
    type: validation
  - name: compute_quality
    type: quality
  - name: route_to_human_review
    type: routing
