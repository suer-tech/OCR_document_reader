profile_id: passport_registration

applicable_sources:
  - crm
  - email
  - portal
  - external
  - other

document_type: passport_registration

models:
  ocr:
    provider: router_ai
    model: google/gemini-2.5-flash-lite
    timeout_seconds: 300.0
  llm_extraction:
    provider: router_ai
    model: x-ai/grok-4.20
    temperature: 0.0
    timeout_seconds: 180.0
    reasoning_effort: low

thresholds:
  technical_quality_min: 0.6
  semantic_confidence_min: 0.7
  overall_quality_min_auto_accept: 0.75
  warnings_require_review: false

fields:
  registration_address:
    required: true
    label_ru: "Адрес регистрации"
    description_ru: "Адрес регистрации (прописки) владельца паспорта"
    extraction_method: "llm"
    prompt_instruction: |
      Извлеки полный адрес регистрации (прописки) владельца паспорта.
      Например: "г. Москва, ул. Тверская, д. 1, кв. 1".
      Если адрес указан в несколько строк, объедини в одну строку через запятую.

pipeline:
  - name: store_original
    type: storage
  - name: detect_document_type
    type: classifier
  - name: extract_entities
    type: extraction
  - name: validate_entities
    type: validation
  - name: compute_quality
    type: quality
  - name: route_to_human_review
    type: routing
