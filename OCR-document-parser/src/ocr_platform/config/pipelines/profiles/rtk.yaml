profile_id: rtk

applicable_sources:
  - crm
  - email
  - portal
  - external
  - other

document_type: rtk

models:
  ocr:
    provider: router_ai
    model: google/gemini-2.5-flash-lite
    timeout_seconds: 300.0
  llm_extraction:
    provider: router_ai
    model: x-ai/grok-4.20
    temperature: 0.0
    timeout_seconds: 180.0
    reasoning_effort: medium

thresholds:
  technical_quality_min: 0.6
  semantic_confidence_min: 0.7
  overall_quality_min_auto_accept: 0.75
  warnings_require_review: false

fields:
  creditor:
    required: true
    label_ru: "Кредитор"
    description_ru: "Наименование юридического лица или ФИО физического лица, являющегося кредитором (заявителем требований)."
    extraction_method: "llm_with_tools"
    prompt_instruction: |
      МЕТОДОЛОГИЯ АНАЛИЗА (SGR / Step-by-Step Reasoning):
      Сначала выполни пошаговые рассуждения в поле "reasoning" строго следуя шагам:
      1. Шаг 1: Найди наименование кредитора в шапке документа (в самом начале). Имейте в виду, что слово «Кредитор» может быть НЕ УКАЗАНО! Оно может располагаться:
         - После слов "Кредитор:", "Заявитель:", "Взыскатель:", "от...".
         - ВООБЩЕ БЕЗ ЭТИХ СЛОВ, просто как фирменный бланк в самом верху.
         - Если не нашел пострайся понять кто предьявляет требования.
      2. Шаг 2: ВНИМАНИЕ НА ПЕРЕНОСЫ СТРОК! Наименование кредитора может занимать несколько строк (например, на одной строке "Общество с ограниченной", а на следующей "ответственностью АЙДИ КОЛЛЕКТ"). Обязательно склеивай такие перенесенные строки в единое полное наименование.
      3. Шаг 3: Найди все упоминания этого кредитора в остальной части документа.
      4. Шаг 4: Вызови инструмент `search_creditor_name`, передав туда ИНН кредитора. 
      5. Шаг 5: Сравни все найденные варианты. Выбери корректное наименование кредитора, подтвержденное инструментом `search_creditor_name`. 
      6. Шаг 6: СОКРАЩАЙ НАЗВАНИЕ ОРГАНИЗАЦИОННО-ПРАВОВОЙ ФОРМЫ: Применяй сокращение длинных аббревиатур юридических лиц, используя стандартные сокращения и аббревиатуры (ООО, ПАО, ПКО). САМО НАИМЕНОВАНИЕ НЕ СОКРАЩАЙ. Пример: "ОБЩЕСТВО С ОГРАНИЧЕННОЙ ОТВЕТСТВЕННОСТЬЮ АЙДИ КОЛЛЕКТ" -> "ООО «АЙДИ КОЛЛЕКТ»", "ПУБЛИЧНОЕ АКЦИИОНЕРНОЕ ОБЩЕСТВО БАНК ВТБ" -> "ПАО БАНК ВТБ", "Акционерное общество «ДОМ.РФ»" -> "АО «ДОМ.РФ»".
      Заполни поля схемы CreditorResult:
      - creditor_name: наименование из текста документа или null
      - creditor_name_web: наименование из интернет-поиска, если поиск использовался, иначе null
      - creditor_final: итоговое наименование кредитора
      - confidence: уверенность от 0 до 1
      - reasoning: краткое объяснение выбора
    prompt_instruction_inn_web_search: |
      Выдели официальное наименование кредитора/организации по ИНН: {inn} исключительно на основе результатов интернет-поиска.
      
      Результаты поиска в интернете:
      {web_search_text}
      
      ВНИМАНИЕ! Не используй текст самого судебного документа, извлеки имя строго по результатам поиска.
      но строго запрещается сокращать или менять само название компании.
      Примеры того, как нужно делать:
      - Общество с ограниченной ответственностью "Ромашка" -> ООО "Ромашка"
      - Публичное акционерное общество "Российские железные дороги" -> ПАО "Российские железные дороги" (НЕ ПАО "РЖД"!)
      - Профессиональная коллекторская организация "Секвойя" -> ПКО "Секвойя"

      Заполни поля схемы CompanyNameResult:
      - company_name: итоговое официальное наименование с сокращенной организационно-правовой формой
      - reasoning: краткое объяснение, из каких строк поиска взято наименование


  creditor_inn:
    required: false
    label_ru: "ИНН кредитора"
    description_ru: "ИНН кредитора. Ищите в шапке документа. Если нет, используйте веб-поиск по найденному наименованию."
    extraction_method: "llm_with_tools"
    prompt_instruction: |
      МЕТОДОЛОГИЯ АНАЛИЗА ДЛЯ ПОИСКА ИНН КРЕДИТОРА (SGR / Step-by-Step Reasoning):
      Сначала выполни пошаговые рассуждения в поле "reasoning" строго следуя шагам:
      1. Определи кто является кредитором/заявителем.
      2. Найди ИНН кредитора/заявителя: он обычно есть в шапке документа или в тексте документа. ИНН может быть после слов "ИНН" или "ИНН/КПП".
      3. ВНИМАНИЕ:Если ИНН в документе не найден, ты ОБЯЗАН использовать инструмент `search_creditor_inn`, передав туда наименование кредитора/заявителя, чтобы найти его ИНН в интернете.
      Заполни поля схемы CreditorInnResult:
      - INN: найденный ИНН из 10 или 12 цифр, либо null
      - confidence: уверенность от 0 до 1
      - reasoning: краткое объяснение источника ИНН
      

  claims_amount:
    required: true
    label_ru: "Сумма требований"
    description_ru: "В документе нужная сумма всегда идет после слов ПРОШУ, ПРОСИТ СУД, ПРОСИМ. В этом блоке перечислено несколько сумм (общая сумма, основной долг, проценты, штрафы, госпошлина)."
    extraction_method: "llm_claims_amount"
    prompt_instruction: |
      МЕТОДОЛОГИЯ АНАЛИЗА ДЛЯ ОПРЕДЕЛЕНИЯ СУММЫ ТРЕБОВАНИЙ (SGR / Step-by-Step Reasoning):
      Сначала выполни пошаговые рассуждения в поле "reasoning" строго следуя шагам:
      1. Проанализируй текст и определи, сколько отдельных обязательств/договоров содержится в документе (например, 1 кредитный договор, 2 кредитных договора и т.д.). Запиши это число в commitments_count.
      2. Найди суммы задолженности (требования), которые просят включить в реестр. Обрати внимание как на суммы по каждому договору отдельно, так и на общую итоговую сумму.
      Сценарий А (Один договор): Если в документе только одно обязательство, верни commitments_count=1 и одну сумму в массиве amounts.
      Сценарий Б (Несколько договоров с разбивкой): Если обязательств несколько и в тексте прямо прописана сумма для каждого из них, верни их количество в commitments_count и список всех сумм по каждому договору в массиве amounts.
      Сценарий В (Несколько договоров без разбивки — ОБЩАЯ СУММА): Если обязательств несколько, но в тексте указана только общая итоговая сумма (или разбивку извлечь невозможно), верни количество договоров в commitments_count, а в массив amounts помести только эту общую сумму (массив из одного элемента).

      КРИТИЧЕСКИ ВАЖНО: В массиве amounts должны быть либо ТОЛЬКО индивидуальные суммы по каждому договору (без общей итоговой суммы), либо ТОЛЬКО одна общая итоговая сумма. СМЕШИВАТЬ индивидуальные и общую итоговую сумму в одном массиве ЗАПРЕЩЕНО, так как это приведет к двойному сложению. Если выписываешь индивидуальные суммы, НЕ ДОБАВЛЯЙ общую сумму. Если выписываешь общую сумму, НЕ ДОБАВЛЯЙ индивидуальные суммы. Не делай самостоятельно никаких сложений или математических вычислений! Выписывай только те значения сумм, которые физически написаны в тексте.
      Исключение (Отказ): Если ты вообще не можешь определить количество обязательств И в тексте нет ни общей, ни раздельных сумм задолженности — только в этом случае верни commitments_count=null и amounts=null.
      Заполни поля схемы ClaimsAmountResult:
      - commitments_count: количество обязательств/договоров или null
      - amounts: массив сумм, физически указанных в тексте, или null
      - confidence: уверенность от 0 до 1
      - reasoning: краткое объяснение выбора сумм
            

  grounds:
    required: true
    label_ru: "Основания"
    description_ru: "Основания возникновения задолженности — одно из допустимых канонических значений."
    extraction_method: "llm"
    prompt_instruction: |
      МЕТОДОЛОГИЯ АНАЛИЗА (SGR / Step-by-Step Reasoning):
      Выполни пошаговый анализ текста в поле "reasoning" на русском языке:
      1. Найди в тексте упоминания документов-оснований задолженности (договоры кредита, займа, судебные акты, приказы, налоги и др.).
      2. Определи СУТЬ обязательства: 
      - если должник получал кредитные денежные средства (кредит, кредитная карта, кредитование счета по ст.850 ГК РФ), то основание — "кредитный договор", даже если формально документ назван "договор банковского счета"
      - если должник не оплатил услуги энергоснабжения, то основание — "договор энергоснабжения"
      - если должник не оплатил услуги ЖКХ, то основание — "договор на предоставление коммунальных услуг"
      - и так далее
      3. Сравни найденные документы со списком допустимых значений ниже.
      4. Выбери из списка ОДНО наиболее подходящее значение.
      
      ПРАВИЛА ПРИОРИТЕТА:
      - "кредитный договор" имеет НАИВЫСШИЙ приоритет: если в тексте есть упоминания кредита, кредитной карты, кредитования счета, процентов за пользование кредитом — выбирай "кредитный договор".
      - Если есть двоякое трактование между кредитом и займом (например "договор потребительского кредита (займа)"), выбирай "кредитный договор".
      - Если ни одно значение не подходит строго, выбери наиболее близкое или верни null.
      
      ДОПУСТИМЫЕ ЗНАЧЕНИЯ документов-оснований:
      - "договор на предоставление коммунальных услуг"
      - "кредитный договор"
      - "соглашение о кредитовании"
      - "договор потребительского микрозайма"
      - "договор потребительского займа"
      - "договор банковского счета"
      - "договор энергоснабжения"
      - "договор займа"
      - "налоговая задолженность"
      - "исполнительный лист"
      - "исполнительный документ"
      - "судебный приказ"
      - "судебный акт"
      - "административное правонарушение"
      
      Заполни поля схемы GroundsResult:
      - grounds: одно значение из списка допустимых значений выше, либо null
      - confidence: уверенность от 0 до 1
      - reasoning: краткое объяснение выбора основания

  case_number:
    required: true
    label_ru: "Номер дела"
    description_ru: "Номер судебного дела в формате 'А05-6/2025' или 'Дело № А05-6/2025'. Обычно указывается в шапке документа."
    extraction_method: "regex"
    regex_pattern: "Дел[оу]\\s*(?:[№N]|ЛЪ|Л[ЬЫЪъ])?\\s*([АA]\\d{1,3}-\\d+/\\d{4})"

pipeline:
  - name: store_original
    type: storage
  - name: detect_document_type
    type: classifier
  - name: extract_entities
    type: extraction
  - name: validate_entities
    type: validation
  - name: compute_quality
    type: quality
  - name: route_to_human_review
    type: routing
