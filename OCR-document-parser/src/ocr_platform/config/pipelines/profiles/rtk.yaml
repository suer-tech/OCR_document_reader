profile_id: rtk

applicable_sources:
  - crm
  - email
  - portal
  - external
  - other

document_type: rtk

models:
  ocr:
    provider: openrouter
    model: openai/gpt-oss-120b
  llm_extraction:
    provider: openrouter
    model: openai/gpt-oss-20b
    fallback_models:
      - openai/gpt-oss-120b
      - x-ai/grok-4.1-fast
    temperature: 0.0
    timeout_seconds: 180.0

thresholds:
  technical_quality_min: 0.6
  semantic_confidence_min: 0.7
  overall_quality_min_auto_accept: 0.75
  warnings_require_review: false

fields:
  creditor:
    required: true
    label_ru: "Кредитор"
    description_ru: "Наименование юридического лица или ФИО физического лица, являющегося кредитором (заявителем требований)."
    extraction_method: "llm_with_tools"
    prompt_instruction: |
      МЕТОДОЛОГИЯ АНАЛИЗА (SGR / Step-by-Step Reasoning):
      Сначала выполни пошаговые рассуждения в поле "reasoning" строго следуя шагам:
      1. Шаг 1: Найди наименование кредитора в шапке документа (в самом начале). Имейте в виду, что слово «Кредитор» может быть НЕ УКАЗАНО! Оно может располагаться:
         - После слов "Кредитор:", "Заявитель:", "Взыскатель:", "от...".
         - ВООБЩЕ БЕЗ ЭТИХ СЛОВ, просто как фирменный бланк в самом верху.
         - Если не нашел пострайся понять кто предьявляет требования.
      2. Шаг 2: ВНИМАНИЕ НА ПЕРЕНОСЫ СТРОК! Наименование кредитора может занимать несколько строк (например, на одной строке "Общество с ограниченной", а на следующей "ответственностью АЙДИ КОЛЛЕКТ"). Обязательно склеивай такие перенесенные строки в единое полное наименование.
      3. Шаг 3: Найди все упоминания этого кредитора в остальной части документа.
      4. Шаг 4: Сравни все найденные варианты. Если в шапке допущена OCR-ошибка (например, "ПАО Сбербан"), а в теле документа есть правильное полное название ("ПАО Сбербанк"), ты ОБЯЗАН использовать инструмент `search_creditor_name`, после получения результата выбери корректное, подтвержденное инструментом `search_creditor_name`. 
      5. Шаг 5: ПРАВИЛО СОКРАЩЁННОГО НАИМЕНОВАНИЯ: Если в документе указано сокращённое наименование, ВСЕГДА возвращай СОКРАЩЁННОЕ. Применяй стандартные аббревиатуры (ООО, ПАО, ПКО). Пример: "ОБЩЕСТВО С ОГРАНИЧЕННОЙ ОТВЕТСТВЕННОСТЬЮ АЙДИ КОЛЛЕКТ" -> "ООО «АйДи Коллект»".

      ФОРМАТ ОТВЕТА В ПОЛЕ "value":
      Верни JSON-объект со следующими полями:
      {
        "creditor_header": "наименование из шапки документа или null",
        "creditor_inn": "ИНН заявителя или null",
        "creditor_body": "наименование из тела документа или null",
        "creditor_web": "наименование из интернета через search_creditor_name иначе null",
        "creditor_final": "ИТОГОВОЕ финальное наименование кредитора"
      }
      Поле "creditor_final" — ОБЯЗАТЕЛЬНО. Оно должно содержать финальное выверенное наименование после анализа всех источников.
      Если кредитора не удалось определить — верни null в "creditor_final".
      
      В поле "confidence" оцени уверенность (0.9 если много совпадений, 0.5 если сомневаешься между вариантами).

  creditor_inn:
    required: false
    label_ru: "ИНН кредитора"
    description_ru: "ИНН кредитора. Ищите в шапке документа. Если нет, используйте веб-поиск по найденному наименованию."
    extraction_method: "llm_with_tools"
    prompt_instruction: |
      Найди ИНН кредитора в шапке документа. Если он найден в тексте документа, верни его. 
      Если не нашел ИНН кредитора ИЩИ любой ИНН после слов "ИНН" или "ИНН/КПП".
      Если ИНН в документе не найден, ты ОБЯЗАН использовать инструмент `search_creditor_inn`, передав туда наименование кредитора, чтобы найти его ИНН в интернете.
      
      ФОРМАТ ОТВЕТА: В поле "value" верни JSON-объект строго в формате: {"INN": "<10 или 12 цифр>"}
      Пример: {"INN": "7730233723"}
      НЕ возвращай ИНН как обычную строку — только в формате {"INN": "..."}.

  claims_amount:
    required: true
    label_ru: "Сумма требований"
    description_ru: "В документе нужная сумма всегда идет после слов ПРОШУ, ПРОСИТ СУД, ПРОСИМ. В этом блоке перечислено несколько сумм (общая сумма, основной долг, проценты, штрафы, госпошлина)."
    extraction_method: "llm_claims_amount"
    prompt_instruction: |
      1. Найди в тексте заявления финальный блок требований. Обычно он начинается со слов "ПРОШУ:", "ПРОСИМ:", "ПРОСИТ СУД:" или аналогичных.
      2. Проанализируй этот блок и определи, сколько отдельных обязательств/договоров содержится в документе (например, 1 кредитный договор, 2 кредитных договора, 3 и т.д.).
      3. Для каждого обязательства/договора найди общую сумму задолженности (требования), которую просят включить в реестр.
      4. Если в документе только одно обязательство — верни commitments_count=1 и одну сумму в массиве amounts.
      5. Если обязательств несколько (например, 2 или 3 кредитных договора) — верни commitments_count с их количеством и список сумм в amounts.
      6. ВНИМАНИЕ: Не делай самостоятельно никаких сложений или математических вычислений! Просто выпиши исходные значения сумм, которые видишь в тексте, по каждому договору отдельно.
      7. Если ты не можешь разделить суммы по отдельным договорам или определить количество обязательств — верни commitments_count=null и amounts=null.
      
      В поле "value" верни ВЛОЖЕННЫЙ JSON объект со следующими ключами:
      {
        "commitments_count": <целое число обязательств/договоров или null>,
        "amounts": [<сумма1>, <сумма2>, ...] или null
      }
      
      В поле "reasoning" опиши ход своих мыслей: сколько обязательств найдено, какие суммы по каждому обязательству указаны, почему сделал такой вывод.

  grounds:
    required: true
    label_ru: "Основания"
    description_ru: "Основания возникновения задолженности — одно из допустимых канонических значений."
    extraction_method: "llm"
    prompt_instruction: |
      МЕТОДОЛОГИЯ АНАЛИЗА (SGR / Step-by-Step Reasoning):
      Выполни пошаговый анализ текста в поле "reasoning" на русском языке:
      1. Найди в тексте упоминания документов-оснований задолженности (договоры кредита, займа, судебные акты, приказы, налоги и др.).
      2. Определи СУТЬ обязательства: если должник получал кредитные денежные средства (кредит, кредитная карта, кредитование счета по ст.850 ГК РФ), то основание — "кредитный договор", даже если формально документ назван "договор банковского счета".
      3. Сравни найденные документы со списком допустимых значений ниже.
      4. Выбери из списка ОДНО наиболее подходящее значение.
      
      ПРАВИЛА ПРИОРИТЕТА:
      - "кредитный договор" имеет НАИВЫСШИЙ приоритет: если в тексте есть упоминания кредита, кредитной карты, кредитования счета, процентов за пользование кредитом — выбирай "кредитный договор".
      - Если есть двоякое трактование между кредитом и займом (например "договор потребительского кредита (займа)"), выбирай "кредитный договор".
      - Если ни одно значение не подходит строго, выбери наиболее близкое или верни null.
      
      ДОПУСТИМЫЕ ЗНАЧЕНИЯ для поля "value":
      - "договор на предоставление коммунальных услуг"
      - "кредитный договор"
      - "договор потребительского микрозайма"
      - "договор потребительского займа"
      - "договор банковского счета"
      - "договор энергоснабжения"
      - "договор займа"
      - "задолженность по уплате налога"
      - "налоговая задолженность"
      - "исполнительный лист"
      - "исполнительный документ"
      - "судебный приказ"
      - "судебный акт"
      - "административное правонарушение"
      
      В поле "value" верни СТРОГО одну строку из списка выше (точно как в списке, в нижнем регистре) или null, если ничего не подходит.

  case_number:
    required: true
    label_ru: "Номер дела"
    description_ru: "Номер судебного дела в формате 'А05-6/2025' или 'Дело № А05-6/2025'. Обычно указывается в шапке документа."
    extraction_method: "regex"
    regex_pattern: "Дел[оу]\\s*(?:[№N]|ЛЪ|Л[ЬЫЪъ])?\\s*([АA]\\d{1,3}-\\d+/\\d{4})"

pipeline:
  - name: store_original
    type: storage
  - name: detect_document_type
    type: classifier
  - name: extract_entities
    type: extraction
  - name: validate_entities
    type: validation
  - name: compute_quality
    type: quality
  - name: route_to_human_review
    type: routing
