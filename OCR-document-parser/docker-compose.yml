version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-api
    restart: always
    command: uvicorn ocr_platform.api.main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 4G
    environment:
      OCR_DATABASE_URL: ${OCR_DATABASE_URL:-postgresql+psycopg://ocr_user:STRONG_PASSWORD@postgres:5432/ocr_db}
      OCR_STORAGE_DIR: /app/data/documents
      OCR_LOG_LEVEL: INFO
      OCR_LOG_FILE_PATH: /app/logs/app.json.log
      OCR_RABBITMQ_URL: ${OCR_RABBITMQ_URL:-amqp://ocr_user:RABBITMQ_PASSWORD@rabbitmq:5672/%2F}
      OCR_RABBITMQ_INGEST_QUEUE: ocr.ingest
      OCR_WORKER_MAX_RETRIES: 3
      OCR_MLFLOW_TRACKING_URI: http://mlflow:5000
      OCR_OPENAI_API_KEY: ${OCR_OPENAI_API_KEY:-}
      OCR_OPENROUTER_API_KEY: ${OCR_OPENROUTER_API_KEY:-}
      OCR_OPENAI_BASE_URL: ${OCR_OPENAI_BASE_URL:-https://api.openai.com/v1}
      OCR_OPENROUTER_BASE_URL: ${OCR_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OCR_ROUTER_AI_API_KEY: ${OCR_ROUTER_AI_API_KEY:-}
      OCR_ROUTER_AI_BASE_URL: ${OCR_ROUTER_AI_BASE_URL:-https://routerai.ru/api/v1}
      OCR_YANDEX_STUDIO_API_KEY: ${OCR_YANDEX_STUDIO_API_KEY:-}
      OCR_YANDEX_STUDIO_BASE_URL: ${OCR_YANDEX_STUDIO_BASE_URL:-https://ai.api.cloud.yandex.net/v1}
      OCR_ENGINE: ${OCR_ENGINE:-tesseract}
      OCR_OLLAMA_OCR_URL: ${OCR_OLLAMA_OCR_URL:-http://localhost:11434}
      OCR_OLLAMA_OCR_MODEL: ${OCR_OLLAMA_OCR_MODEL:-glm-ocr}
      OCR_OLLAMA_OCR_TOKEN: ${OCR_OLLAMA_OCR_TOKEN:-}
      OMP_NUM_THREADS: '8'
      MKL_NUM_THREADS: '8'
      TOKENIZERS_PARALLELISM: 'true'
    shm_size: 2g
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - ../документы:/документы:ro
    ports:
      - "127.0.0.1:8000:8000" # Доступно локально на сервере (проксируется наружу через Nginx)
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mlflow:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-worker
    restart: always
    command: ocr-pipeline-worker
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          cpus: '4.0'
          memory: 4G
    shm_size: 2g
    environment:
      OCR_DATABASE_URL: ${OCR_DATABASE_URL:-postgresql+psycopg://ocr_user:STRONG_PASSWORD@postgres:5432/ocr_db}
      OCR_STORAGE_DIR: /app/data/documents
      OCR_LOG_LEVEL: INFO
      OCR_LOG_FILE_PATH: /app/logs/app.json.log
      OCR_RABBITMQ_URL: ${OCR_RABBITMQ_URL:-amqp://ocr_user:RABBITMQ_PASSWORD@rabbitmq:5672/%2F}
      OCR_RABBITMQ_INGEST_QUEUE: ocr.ingest
      OCR_WORKER_MAX_RETRIES: 3
      OCR_MLFLOW_TRACKING_URI: http://mlflow:5000
      OCR_OPENAI_API_KEY: ${OCR_OPENAI_API_KEY:-}
      OCR_OPENROUTER_API_KEY: ${OCR_OPENROUTER_API_KEY:-}
      OCR_OPENAI_BASE_URL: ${OCR_OPENAI_BASE_URL:-https://api.openai.com/v1}
      OCR_OPENROUTER_BASE_URL: ${OCR_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OCR_ROUTER_AI_API_KEY: ${OCR_ROUTER_AI_API_KEY:-}
      OCR_ROUTER_AI_BASE_URL: ${OCR_ROUTER_AI_BASE_URL:-https://routerai.ru/api/v1}
      OCR_YANDEX_STUDIO_API_KEY: ${OCR_YANDEX_STUDIO_API_KEY:-}
      OCR_YANDEX_STUDIO_BASE_URL: ${OCR_YANDEX_STUDIO_BASE_URL:-https://ai.api.cloud.yandex.net/v1}
      OCR_ENGINE: ${OCR_ENGINE:-tesseract}
      OCR_OLLAMA_OCR_URL: ${OCR_OLLAMA_OCR_URL:-http://localhost:11434}
      OCR_OLLAMA_OCR_MODEL: ${OCR_OLLAMA_OCR_MODEL:-glm-ocr}
      OCR_OLLAMA_OCR_TOKEN: ${OCR_OLLAMA_OCR_TOKEN:-}
      OMP_NUM_THREADS: '8'
      MKL_NUM_THREADS: '8'
      TOKENIZERS_PARALLELISM: 'true'
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - ../документы:/документы:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mlflow:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: ocr-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ocr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-STRONG_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ocr_db}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" # Локальный порт для бэкапов и отладки
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ocr_user} -d $${POSTGRES_DB:-ocr_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ocr-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ocr_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672" # Панель управления (проксируется через Nginx)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  mlflow:
    image: python:3.11-slim
    container_name: ocr-mlflow
    restart: always
    command: >
      sh -c "pip install --no-cache-dir mlflow &&
      mlflow db upgrade sqlite:////mlflow/data/mlflow.db &&
      exec mlflow server --host 0.0.0.0 --port 5000 --allowed-hosts localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow,mlflow:5000,ocr-mlflow,ocr-mlflow:5000 --backend-store-uri sqlite:////mlflow/data/mlflow.db --default-artifact-root mlflow-artifacts:/ --artifacts-destination /mlflow/artifacts"
    ports:
      - "127.0.0.1:5000:5000" # Доступно локально (проксируется через Nginx)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mlflow-data:/mlflow/data
      - mlflow-artifacts:/mlflow/artifacts

  loki:
    image: grafana/loki:3.1.1
    container_name: ocr-loki
    restart: always
    command: -config.file=/etc/loki/config.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.1.1
    container_name: ocr-promtail
    restart: always
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - app-logs:/workspace/logs:ro

  grafana:
    image: grafana/grafana:11.1.4
    container_name: ocr-grafana
    restart: always
    depends_on:
      - loki
    ports:
      - "127.0.0.1:3000:3000" # Графана (проксируется через Nginx)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  app-data:
  app-logs:
  pg-data:
  rabbitmq-data:
  mlflow-data:
  mlflow-artifacts:
  loki-data:
  grafana-data:
  