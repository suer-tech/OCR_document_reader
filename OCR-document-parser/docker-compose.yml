version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-api
    restart: always
    command: uvicorn ocr_platform.api.main:app --host 0.0.0.0 --port 8000
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          cpus: '2.0'
          memory: 4G
    environment:
      OCR_DATABASE_URL: ${OCR_DATABASE_URL:-postgresql+psycopg://ocr_user:STRONG_PASSWORD@postgres:5432/ocr_db}
      OCR_STORAGE_DIR: /app/data/documents
      OCR_LOG_LEVEL: INFO
      OCR_LOG_FILE_PATH: /app/logs/app.json.log
      OCR_RABBITMQ_URL: ${OCR_RABBITMQ_URL:-amqp://ocr_user:RABBITMQ_PASSWORD@rabbitmq:5672/%2F}
      OCR_RABBITMQ_INGEST_QUEUE: ocr.ingest
      OCR_WORKER_MAX_RETRIES: 3
      OCR_MLFLOW_TRACKING_URI: http://mlflow:5000
      OCR_OPENAI_API_KEY: ${OCR_OPENAI_API_KEY:-}
      OCR_OPENROUTER_API_KEY: ${OCR_OPENROUTER_API_KEY:-}
      OCR_OPENAI_BASE_URL: ${OCR_OPENAI_BASE_URL:-https://api.openai.com/v1}
      OCR_OPENROUTER_BASE_URL: ${OCR_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OCR_ROUTER_AI_API_KEY: ${OCR_ROUTER_AI_API_KEY:-}
      OCR_ROUTER_AI_BASE_URL: ${OCR_ROUTER_AI_BASE_URL:-https://routerai.ru/api/v1}
      OCR_YANDEX_STUDIO_API_KEY: ${OCR_YANDEX_STUDIO_API_KEY:-}
      OCR_YANDEX_STUDIO_BASE_URL: ${OCR_YANDEX_STUDIO_BASE_URL:-https://ai.api.cloud.yandex.net/v1}
      OCR_ENGINE: ${OCR_ENGINE:-tesseract}
      OCR_OLLAMA_OCR_URL: ${OCR_OLLAMA_OCR_URL:-http://localhost:11434}
      OCR_OLLAMA_OCR_MODEL: ${OCR_OLLAMA_OCR_MODEL:-glm-ocr}
      OCR_OLLAMA_OCR_TOKEN: ${OCR_OLLAMA_OCR_TOKEN:-}
      OMP_NUM_THREADS: '8'
      MKL_NUM_THREADS: '8'
      TOKENIZERS_PARALLELISM: 'true'
      PYTORCH_CUDA_ALLOC_CONF: ''
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_BASE_URL: "http://langfuse:3000"
      OCR_DADATA_API_KEY: ${OCR_DADATA_API_KEY:-}
    shm_size: 2g
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - ../документы:/документы:ro
    ports:
      - "127.0.0.1:8000:8000" # Доступно локально на сервере (проксируется наружу через Nginx)
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mlflow:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    command: ocr-pipeline-worker
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          cpus: '4.0'
          memory: 4G
    shm_size: 2g
    environment:
      OCR_DATABASE_URL: ${OCR_DATABASE_URL:-postgresql+psycopg://ocr_user:STRONG_PASSWORD@postgres:5432/ocr_db}
      OCR_STORAGE_DIR: /app/data/documents
      OCR_LOG_LEVEL: INFO
      OCR_LOG_FILE_PATH: /app/logs/app.json.log
      OCR_RABBITMQ_URL: ${OCR_RABBITMQ_URL:-amqp://ocr_user:RABBITMQ_PASSWORD@rabbitmq:5672/%2F}
      OCR_RABBITMQ_INGEST_QUEUE: ocr.ingest
      OCR_WORKER_MAX_RETRIES: 3
      OCR_MLFLOW_TRACKING_URI: http://mlflow:5000
      OCR_OPENAI_API_KEY: ${OCR_OPENAI_API_KEY:-}
      OCR_OPENROUTER_API_KEY: ${OCR_OPENROUTER_API_KEY:-}
      OCR_OPENAI_BASE_URL: ${OCR_OPENAI_BASE_URL:-https://api.openai.com/v1}
      OCR_OPENROUTER_BASE_URL: ${OCR_OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OCR_ROUTER_AI_API_KEY: ${OCR_ROUTER_AI_API_KEY:-}
      OCR_ROUTER_AI_BASE_URL: ${OCR_ROUTER_AI_BASE_URL:-https://routerai.ru/api/v1}
      OCR_YANDEX_STUDIO_API_KEY: ${OCR_YANDEX_STUDIO_API_KEY:-}
      OCR_YANDEX_STUDIO_BASE_URL: ${OCR_YANDEX_STUDIO_BASE_URL:-https://ai.api.cloud.yandex.net/v1}
      OCR_ENGINE: ${OCR_ENGINE:-tesseract}
      OCR_OLLAMA_OCR_URL: ${OCR_OLLAMA_OCR_URL:-http://localhost:11434}
      OCR_OLLAMA_OCR_MODEL: ${OCR_OLLAMA_OCR_MODEL:-glm-ocr}
      OCR_OLLAMA_OCR_TOKEN: ${OCR_OLLAMA_OCR_TOKEN:-}
      OMP_NUM_THREADS: '8'
      MKL_NUM_THREADS: '8'
      TOKENIZERS_PARALLELISM: 'true'
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_BASE_URL: "http://langfuse:3000"
      OCR_DADATA_API_KEY: ${OCR_DADATA_API_KEY:-}
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - ../документы:/документы:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mlflow:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: ocr-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ocr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-STRONG_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ocr_db}
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432" # Локальный порт для бэкапов и отладки
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-ocr_user} -d $${POSTGRES_DB:-ocr_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ocr-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ocr_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672" # Панель управления (проксируется через Nginx)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  mlflow:
    image: python:3.11-slim
    container_name: ocr-mlflow
    restart: always
    command: >
      sh -c "pip install --no-cache-dir mlflow &&
      mlflow db upgrade sqlite:////mlflow/data/mlflow.db &&
      exec mlflow server --host 0.0.0.0 --port 5000 --allowed-hosts localhost,localhost:5000,127.0.0.1,127.0.0.1:5000,mlflow,mlflow:5000,ocr-mlflow,ocr-mlflow:5000 --backend-store-uri sqlite:////mlflow/data/mlflow.db --default-artifact-root mlflow-artifacts:/ --artifacts-destination /mlflow/artifacts"
    ports:
      - "127.0.0.1:5000:5000" # Доступно локально (проксируется через Nginx)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mlflow-data:/mlflow/data
      - mlflow-artifacts:/mlflow/artifacts

  loki:
    image: grafana/loki:3.1.1
    container_name: ocr-loki
    restart: always
    command: -config.file=/etc/loki/config.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.1.1
    container_name: ocr-promtail
    restart: always
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - app-logs:/workspace/logs:ro

  grafana:
    image: grafana/grafana:11.1.4
    container_name: ocr-grafana
    restart: always
    depends_on:
      - loki
    ports:
      - "127.0.0.1:3000:3000" # Графана (проксируется через Nginx)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana

  minio:
    image: minio/minio
    container_name: ocr-minio
    command: server /data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: ocr-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/langfuse-events || true;
      /usr/bin/mc mb myminio/langfuse-media || true;
      exit 0;
      "

  langfuse:
    image: langfuse/langfuse:3
    container_name: ocr-langfuse
    restart: always
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=mysecret_random_string_123
      - SALT=mysalt_random_string_123
      - NEXTAUTH_URL=http://localhost:3001
      - TELEMETRY_ENABLED=false
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_PASSWORD=langfuse
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse-events
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=minioadmin
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse-media
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=minioadmin
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
      - REDIS_HOST=langfuse-redis
      - REDIS_PORT=6379
      - REDIS_AUTH=langfuse_redis_pass
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse-events
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=minioadmin
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse-media
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=minioadmin
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      langfuse-redis:
        condition: service_healthy

  langfuse-db:
    image: postgres:15-alpine
    container_name: ocr-langfuse-db
    restart: always
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: ocr-clickhouse
    restart: always
    environment:
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_PASSWORD=langfuse
      - CLICKHOUSE_DB=langfuse
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse-redis:
    image: redis:7-alpine
    container_name: ocr-langfuse-redis
    command: redis-server --requirepass langfuse_redis_pass
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "langfuse_redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: ocr-langfuse-worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=mysecret_random_string_123
      - SALT=mysalt_random_string_123
      - NEXTAUTH_URL=http://localhost:3001
      - TELEMETRY_ENABLED=false
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_USER=langfuse
      - CLICKHOUSE_PASSWORD=langfuse
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_HOST=langfuse-redis
      - REDIS_PORT=6379
      - REDIS_AUTH=langfuse_redis_pass
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=langfuse-events
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=minioadmin
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=langfuse-media
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=minioadmin
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy

volumes:
  app-data:
  app-logs:
  rabbitmq-data:
  mlflow-data:
  mlflow-artifacts:
  loki-data:
  grafana-data:


  langfuse-db-data:
  clickhouse-data:
  minio-data:
